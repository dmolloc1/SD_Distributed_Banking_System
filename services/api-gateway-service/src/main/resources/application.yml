server:
  port: 8080

spring:
  application:
    name: api-gateway-service
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: coordinator-transfers
          uri: lb://coordinator-service
          predicates:
            - Path=/api/transfers/{transactionId}
          filters:
            - RewritePath=/api/transfers/(?<transactionId>[^/]+), /api/v1/orchestrator/transfers/$\{transactionId}

        - id: coordinator-health
          uri: lb://coordinator-service
          predicates:
            - Path=/api/coordinator/health
          filters:
            - SetPath=/distributed/health

        - id: bank-a-health
          uri: lb://bank-a-service
          predicates:
            - Path=/api/bank-a/health
          filters:
            - SetPath=/health

        - id: bank-b-health
          uri: lb://bank-b-service
          predicates:
            - Path=/api/bank-b/health
          filters:
            - SetPath=/health

        - id: bank-c-health
          uri: lb://bank-c-service
          predicates:
            - Path=/api/bank-c/health
          filters:
            - SetPath=/health

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

gateway:
  grpc:
    port: ${GATEWAY_GRPC_PORT:9090}
  services:
    coordinator-url: http://coordinator-service
    bank-a-url: http://bank-a-service
    bank-b-url: http://bank-b-service
    bank-c-url: http://bank-c-service
