server:
  port: 8083

spring:
  application:
    name: bank-c-service

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

bank:
  code: BANK_C
  data:
    clients-file: data/clients_C.json
    accounts-file: data/accounts_C.json
    transactions-log: data/transactions_C.log
    backup-accounts-file: data/backup_accounts_C.json
